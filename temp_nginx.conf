worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout  65;

  client_max_body_size 20M;
  proxy_read_timeout 300;
  proxy_connect_timeout 300;
  proxy_send_timeout 300;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;

  upstream api_upstream {
    server 10.50.0.2:8080;
    server 10.50.0.3:8080;
    keepalive 32;
  }

  # HTTPS Server Block
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name younov.com www.younov.com;

    # Define the root for all requests in this server block
    root /var/www/younov/dist;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/younov.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/younov.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # Security and real IP headers
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # API reverse proxy
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_pass http://api_upstream;
    }

    # Static assets (try file first, then 404)
    location ~* \.(?:js|css|map|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|eot)$ {
      try_files $uri =404;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # SPA: all other paths fallback to index.html so /browse, /free, /novel/xxx work
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
  }

  # HTTP Server Block for redirection
  server {
    listen 80;
    listen [::]:80;
    server_name younov.com www.younov.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
  }
}