<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouNov iOS App</title>
    <style>
        body {
            background-color: #0f172a; /* slate-950 */
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border-radius: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
        }
        h1 { margin: 0 0 16px 0; font-size: 24px; }
        p { color: #94a3b8; line-height: 1.5; max-width: 300px; margin-bottom: 32px; }
        .badge {
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 600;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>
    <div class="icon">Y</div>
    <h1>iOS App Coming Soon</h1>
    <p>The YouNov app for iOS is currently under review and will be available on the App Store shortly.</p>
    <div class="badge">Stay Tuned</div>
</body>
</html>
