# /etc/nginx/snippets/younov_logic.conf

root /var/www/younov/dist;
index index.html;

location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri =404;
}

location = /api { return 301 /api/health; }
# location = /api/ { return 301 /api/health; } # This was causing issues maybe? No, checking health.

location ^~ /uploads/ {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://younov_api;

    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
}

location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Force HTTPS proto if we are behind Cloudflare Flexible
    set $proto $scheme;
    if ($http_x_forwarded_proto = "https") { set $proto "https"; }
    proxy_set_header X-Forwarded-Proto $proto;

    proxy_connect_timeout 3s;
    proxy_read_timeout 60s;
    proxy_pass http://younov_api;

    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    expires off;
}

location ~* \.(?:js|css|map|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|eot)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
}

location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}
