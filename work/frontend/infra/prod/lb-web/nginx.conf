worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout  65;

  # 调整上传大小限制
  client_max_body_size 20M;
  
  # 增加超时时间以避免大文件上传或慢速请求失败
  proxy_read_timeout 300;
  proxy_connect_timeout 300;
  proxy_send_timeout 300;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;

  # 同机（LB+Web）内部 upstream：web 容器
  upstream web_upstream {
    server web:3000;
    keepalive 32;
  }

  # 远端 upstream：API 服务器（wg0 内网；请确认防火墙仅允许本 LB 访问 8080）
  upstream api_upstream {
    server 10.50.0.2:8080;
    server 10.50.0.3:8080;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_pass http://api_upstream;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_pass http://web_upstream;
    }
  }
}

